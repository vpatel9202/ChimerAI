---
# Copy this file to inventories/local/chimerai.sops.yaml, fill in your local
# values, then encrypt it with SOPS.

chimerai_host_name: localhost
chimerai_timezone: Etc/UTC
chimerai_deployment_root: /opt/chimerai
chimerai_state_root: /opt/chimerai/apps
chimerai_action: validate
chimerai_domain: example.com
chimerai_acme_email: admin@example.com

chimerai_ingress:
  enabled: true
  provider: traefik
  tls:
    enabled: true
    ca: letsencrypt
    resolver: letsencrypt
    challenge: http-01
    staging: true
  auth:
    provider: authentik
    protect_apps_by_default: true

chimerai_enabled_roles:
  - common
  - docker
  - networks
  - traefik
  - authentik
  - backup
  - diag
  - open_webui
  - openclaw

chimerai_runtime:
  engine: docker
  compose_command: docker compose

chimerai_networks:
  - name: chimerai-public
    purpose: ingress
  - name: chimerai-internal
    purpose: private-service
  - name: chimerai-mcp
    purpose: mcp

chimerai_services:
  traefik:
    enabled: true
    image: traefik:v3
    dashboard:
      enabled: false

  authentik:
    enabled: true
    image: ghcr.io/goauthentik/server:2025.10
    host: auth.example.com
    bootstrap_email: admin@example.com
    bootstrap_password: replace-me
    bootstrap_token: replace-me
    postgres_password: replace-me
    secret_key: replace-me
    automation_enabled: true
    postgres_max_connections: 300
    web_workers: 2
    web_threads: 2
    worker_processes: 1
    worker_threads: 2

  open_webui:
    image: ghcr.io/open-webui/open-webui:main
    host: 127.0.0.1
    host_port: 13080
    container_port: 8080
    auth_enabled: true
    ingress:
      enabled: false
      host: webui.example.com
      auth_required: true

  # Provider keys are app-local for now. A future provider registry may let
  # multiple apps inherit shared credentials without duplicating values.
  openclaw:
    enabled: true
    image: ghcr.io/openclaw/openclaw:latest
    host: openclaw.example.com
    auth_required: true
    mcp_network: chimerai-mcp
    allow_unconfigured: true
    provider:
      anthropic_api_key: replace-me
      openai_api_key: replace-me

  # Optional host-installed agent CLI layer. Add `agent_cli` to
  # `chimerai_enabled_roles` to install enabled tools.
  agent_cli:
    install_method: npm
    install_node: true
    node_repository_enabled: true
    node_major: 22
    install_prefix: "{{ ansible_env.HOME }}/.local/share/chimerai/agent-cli/npm"
    bin_dir: "{{ ansible_env.HOME }}/.local/bin"
    tools:
      codex:
        enabled: true
      claude:
        enabled: false
      gemini:
        enabled: false
      opencode:
        enabled: false

  # Optional containerized agent CLI runner. Mount only the workspace paths
  # the runner should be able to access.
  runner:
    image: node:22-bookworm
    network: chimerai-internal
    workspace_dir: /opt/chimerai/apps/runner/workspace
    tools:
      codex:
        enabled: true
      claude:
        enabled: true
      gemini:
        enabled: true
      opencode:
        enabled: true

  # Optional first MCP server role. Add `mcp_todoist` to
  # `chimerai_enabled_roles` after setting a real encrypted API key.
  mcp_todoist:
    enabled: false
    image: node:22-alpine
    package_version: "8.12.1"
    host: 127.0.0.1
    host_port: 13002
    container_port: 3000
    session_timeout_ms: 1800000
    todoist_api_key: replace-me

chimerai_backup:
  enabled: false
  engine: restic
  # Use an absolute local path for first tests, or a supported Restic remote
  # such as s3:https://s3.amazonaws.com/bucket-name/prefix.
  repository: /opt/chimerai/backups/restic
  password: replace-me
  tags:
    - chimerai
