---
- name: ChimerAI
  hosts: chimerai
  gather_facts: true
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

  pre_tasks:
    - name: Load SOPS-encrypted ChimerAI config file
      community.sops.load_vars:
        file: "{{ chimerai_config_file }}"
      no_log: true
      when:
        - chimerai_config_file is defined
        - chimerai_config_file | length > 0
      tags:
        - always

  roles:
    - role: common
      when: "'common' in chimerai_enabled_roles"
      tags:
        - common
        - core
    - role: docker
      when: "'docker' in chimerai_enabled_roles"
      tags:
        - docker
        - core
    - role: networks
      when: "'networks' in chimerai_enabled_roles"
      tags:
        - networks
        - core
    - role: traefik
      when: "'traefik' in chimerai_enabled_roles"
      tags:
        - traefik
        - ingress
    - role: authentik
      when: "'authentik' in chimerai_enabled_roles"
      tags:
        - authentik
        - auth
    - role: open_webui
      when: "'open_webui' in chimerai_enabled_roles"
      tags:
        - open_webui
        - app
    - role: agent_cli
      when: "'agent_cli' in chimerai_enabled_roles"
      tags:
        - agent_cli
        - host_tool
    - role: runner
      when: "'runner' in chimerai_enabled_roles"
      tags:
        - runner
        - sandbox
    - role: mcp_todoist
      when: "'mcp_todoist' in chimerai_enabled_roles"
      tags:
        - mcp_todoist
        - mcp
        - app
    - role: openclaw
      when: "'openclaw' in chimerai_enabled_roles"
      tags:
        - openclaw
        - app
    - role: backup
      when: "'backup' in chimerai_enabled_roles"
      tags:
        - backup
        - restore
    - role: diag
      when: "'diag' in chimerai_enabled_roles"
      tags:
        - diag
        - validate

  post_tasks:
    - name: Remove ChimerAI Docker networks after services are removed
      community.docker.docker_network:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ chimerai_networks | reverse | list }}"
      when: chimerai_action == "remove"
      tags:
        - networks
        - remove

    - name: Remove ChimerAI roots after services are removed
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ chimerai_deployment_root }}"
        - "{{ chimerai_state_root }}"
      when:
        - chimerai_action == "remove"
        - chimerai_remove_roots | default(false) | bool
      tags:
        - common
        - remove
