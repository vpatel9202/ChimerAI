---
- name: Validate runner configuration
  ansible.builtin.assert:
    that:
      - chimerai_runner_image | length > 0
      - chimerai_runner_network | length > 0
      - chimerai_runner_tools is mapping
    fail_msg: "Runner configuration is incomplete."

- name: Build enabled runner tool list
  ansible.builtin.set_fact:
    chimerai_runner_enabled_tools: >-
      {{
        chimerai_runner_tools
        | dict2items
        | selectattr('value.enabled', 'defined')
        | selectattr('value.enabled')
        | map(attribute='key')
        | list
      }}

- name: Validate at least one runner tool is enabled
  ansible.builtin.assert:
    that:
      - chimerai_runner_enabled_tools | length > 0
    fail_msg: "Runner requires at least one enabled tool."

- name: Validate enabled runner tools are known
  ansible.builtin.assert:
    that:
      - item in chimerai_runner_tool_catalog
    fail_msg: "Unknown runner tool '{{ item }}'."
  loop: "{{ chimerai_runner_enabled_tools }}"

- name: Create runner directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "0755"
  loop:
    - path: "{{ chimerai_runner_app_dir }}"
    - path: "{{ chimerai_runner_workspace_dir }}"
      owner: "{{ chimerai_runner_uid }}"
      group: "{{ chimerai_runner_gid }}"
    - path: "{{ chimerai_runner_npm_prefix_dir }}"
      owner: "{{ chimerai_runner_uid }}"
      group: "{{ chimerai_runner_gid }}"
    - path: "{{ chimerai_runner_npm_cache_dir }}"
      owner: "{{ chimerai_runner_uid }}"
      group: "{{ chimerai_runner_gid }}"
  when: chimerai_action == "apply"

- name: Render runner Compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ chimerai_runner_app_dir }}/compose.yml"
    mode: "0644"
  when: chimerai_action == "apply"

- name: Start runner
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_runner_app_dir }}"
    project_name: "{{ chimerai_runner_project_name }}"
    state: present
    remove_orphans: true
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Validate enabled runner executables
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ chimerai_runner_project_name }}"
      - "{{ chimerai_runner_tool_catalog[item].executable }}"
      - "{{ chimerai_runner_tool_catalog[item].version_arg }}"
  loop: "{{ chimerai_runner_enabled_tools }}"
  register: chimerai_runner_version_checks
  changed_when: false
  retries: 12
  delay: 5
  until: chimerai_runner_version_checks.rc == 0
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Check whether runner Compose file exists
  ansible.builtin.stat:
    path: "{{ chimerai_runner_app_dir }}/compose.yml"
  register: chimerai_runner_compose_file
  when: chimerai_action == "remove"

- name: Stop and remove runner
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_runner_app_dir }}"
    project_name: "{{ chimerai_runner_project_name }}"
    state: absent
    remove_orphans: true
  when:
    - chimerai_action == "remove"
    - chimerai_runner_compose_file.stat.exists

- name: Remove runner generated config
  ansible.builtin.file:
    path: "{{ chimerai_runner_app_dir }}"
    state: absent
  when: chimerai_action == "remove"

- name: Remove runner state when explicitly allowed
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ chimerai_state_root }}:/chimerai-state"
      - alpine:3.20
      - sh
      - -c
      - rm -rf /chimerai-state/runner
  when:
    - chimerai_action == "remove"
    - chimerai_runner_remove_state | bool
  changed_when: true
