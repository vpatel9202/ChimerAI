---
chimerai_openclaw_name: openclaw
chimerai_openclaw_project_name: chimerai-openclaw
chimerai_openclaw_image: "{{ chimerai_services.openclaw.image | default('ghcr.io/openclaw/openclaw:latest') }}"
chimerai_openclaw_host: "{{ chimerai_services.openclaw.host | default('openclaw.' + chimerai_domain) }}"
chimerai_openclaw_auth_required: "{{ chimerai_services.openclaw.auth_required | default(chimerai_ingress.auth.protect_apps_by_default | default(true)) }}"
chimerai_openclaw_gateway_port: "{{ chimerai_services.openclaw.gateway_port | default(18789) }}"
chimerai_openclaw_bridge_port: "{{ chimerai_services.openclaw.bridge_port | default(18790) }}"
chimerai_openclaw_bind: "{{ chimerai_services.openclaw.bind | default('lan') }}"
chimerai_openclaw_public_network: "{{ chimerai_services.openclaw.public_network | default('chimerai-public') }}"
chimerai_openclaw_app_dir: "{{ chimerai_deployment_root }}/openclaw"
chimerai_openclaw_state_dir: "{{ chimerai_state_root }}/openclaw"
chimerai_openclaw_config_dir: "{{ chimerai_openclaw_state_dir }}/config"
chimerai_openclaw_workspace_dir: "{{ chimerai_openclaw_state_dir }}/workspace"
chimerai_openclaw_uid: "{{ chimerai_services.openclaw.uid | default(1000) }}"
chimerai_openclaw_gid: "{{ chimerai_services.openclaw.gid | default(1000) }}"
chimerai_openclaw_acme_resolver: "{{ chimerai_ingress.tls.resolver | default('letsencrypt') }}"
chimerai_openclaw_anthropic_api_key: "{{ chimerai_services.openclaw.provider.anthropic_api_key | default('') }}"
chimerai_openclaw_openai_api_key: "{{ chimerai_services.openclaw.provider.openai_api_key | default('') }}"
chimerai_openclaw_remove_state: "{{ chimerai_services.openclaw.remove_state | default(false) }}"
