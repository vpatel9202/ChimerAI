---
- name: Validate OpenClaw configuration
  ansible.builtin.assert:
    that:
      - chimerai_openclaw_image | length > 0
      - chimerai_openclaw_host | length > 0
      - chimerai_openclaw_gateway_port | int > 0
      - chimerai_openclaw_bridge_port | int > 0
      - chimerai_openclaw_public_network | length > 0
      - chimerai_openclaw_mcp_servers is sequence
      - chimerai_openclaw_mcp_network | length > 0
    fail_msg: "OpenClaw configuration is incomplete."

- name: Create OpenClaw directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "0755"
  loop:
    - path: "{{ chimerai_openclaw_app_dir }}"
      owner: "{{ ansible_user_uid | default(omit) }}"
      group: "{{ ansible_user_gid | default(omit) }}"
    - path: "{{ chimerai_openclaw_config_dir }}"
      owner: "{{ chimerai_openclaw_uid }}"
      group: "{{ chimerai_openclaw_gid }}"
    - path: "{{ chimerai_openclaw_workspace_dir }}"
      owner: "{{ chimerai_openclaw_uid }}"
      group: "{{ chimerai_openclaw_gid }}"
  when: chimerai_action == "apply"

- name: Render OpenClaw env file
  ansible.builtin.template:
    src: openclaw.env.j2
    dest: "{{ chimerai_openclaw_app_dir }}/.env"
    mode: "0600"
  no_log: true
  when: chimerai_action == "apply"

- name: Render OpenClaw Compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ chimerai_openclaw_app_dir }}/compose.yml"
    mode: "0644"
  when: chimerai_action == "apply"

- name: Start OpenClaw
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_openclaw_app_dir }}"
    project_name: "{{ chimerai_openclaw_project_name }}"
    state: present
    remove_orphans: true
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Build OpenClaw MCP configs
  ansible.builtin.set_fact:
    chimerai_openclaw_mcp_configs: "{{ chimerai_openclaw_mcp_configs | default({}) | combine({item.name: {'url': item.url, 'transport': item.transport}}) }}"
  loop: "{{ chimerai_openclaw_mcp_servers }}"
  when: chimerai_action == "apply"

- name: Read OpenClaw MCP registry entries
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ chimerai_openclaw_project_name }}-gateway"
      - node
      - dist/index.js
      - mcp
      - show
      - "{{ item.name }}"
      - --json
  loop: "{{ chimerai_openclaw_mcp_servers }}"
  register: chimerai_openclaw_mcp_show
  changed_when: false
  failed_when: false
  when:
    - chimerai_action == "apply"
    - chimerai_openclaw_mcp_servers | length > 0
    - not ansible_check_mode

- name: Store current OpenClaw MCP registry entries
  ansible.builtin.set_fact:
    chimerai_openclaw_mcp_current: "{{ chimerai_openclaw_mcp_current | default({}) | combine({item.item.name: (item.stdout | from_json)}) }}"
  loop: "{{ chimerai_openclaw_mcp_show.results | default([]) }}"
  when:
    - chimerai_action == "apply"
    - chimerai_openclaw_mcp_servers | length > 0
    - not ansible_check_mode
    - item.rc == 0

- name: Reconcile OpenClaw MCP registry entries
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ chimerai_openclaw_project_name }}-gateway"
      - node
      - dist/index.js
      - mcp
      - set
      - "{{ item.name }}"
      - "{{ chimerai_openclaw_mcp_configs[item.name] | to_json }}"
  loop: "{{ chimerai_openclaw_mcp_servers }}"
  changed_when: true
  when:
    - chimerai_action == "apply"
    - chimerai_openclaw_mcp_servers | length > 0
    - not ansible_check_mode
    - >-
      (chimerai_openclaw_mcp_current | default({})).get(item.name, {}) != chimerai_openclaw_mcp_configs[item.name]

- name: Check whether OpenClaw Compose file exists
  ansible.builtin.stat:
    path: "{{ chimerai_openclaw_app_dir }}/compose.yml"
  register: chimerai_openclaw_compose_file
  when: chimerai_action == "remove"

- name: Stop and remove OpenClaw
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_openclaw_app_dir }}"
    project_name: "{{ chimerai_openclaw_project_name }}"
    state: absent
    remove_orphans: true
  when:
    - chimerai_action == "remove"
    - chimerai_openclaw_compose_file.stat.exists

- name: Remove OpenClaw generated config
  ansible.builtin.file:
    path: "{{ chimerai_openclaw_app_dir }}"
    state: absent
  when: chimerai_action == "remove"

- name: Remove OpenClaw state when explicitly allowed
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ chimerai_state_root }}:/chimerai-state"
      - alpine:3.20
      - sh
      - -c
      - rm -rf /chimerai-state/openclaw
  when:
    - chimerai_action == "remove"
    - chimerai_openclaw_remove_state | bool
  changed_when: true
