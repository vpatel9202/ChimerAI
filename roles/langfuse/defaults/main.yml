---
chimerai_langfuse_name: langfuse
chimerai_langfuse_project_name: chimerai-langfuse
chimerai_langfuse_web_image: "{{ chimerai_services.langfuse.web_image | default('langfuse/langfuse:3') }}"
chimerai_langfuse_worker_image: "{{ chimerai_services.langfuse.worker_image | default('langfuse/langfuse-worker:3') }}"
chimerai_langfuse_postgres_image: "{{ chimerai_services.langfuse.postgres_image | default('postgres:16-alpine') }}"
chimerai_langfuse_clickhouse_image: "{{ chimerai_services.langfuse.clickhouse_image | default('clickhouse/clickhouse-server:latest') }}"
chimerai_langfuse_redis_image: "{{ chimerai_services.langfuse.redis_image | default('redis:7-alpine') }}"
chimerai_langfuse_minio_image: "{{ chimerai_services.langfuse.minio_image | default('minio/minio:latest') }}"
chimerai_langfuse_minio_client_image: "{{ chimerai_services.langfuse.minio_client_image | default('minio/mc:latest') }}"
chimerai_langfuse_host: "{{ chimerai_services.langfuse.host | default('127.0.0.1') }}"
chimerai_langfuse_host_port: "{{ chimerai_services.langfuse.host_port | default(13000) }}"
chimerai_langfuse_web_port: "{{ chimerai_services.langfuse.web_port | default(3000) }}"
chimerai_langfuse_worker_port: "{{ chimerai_services.langfuse.worker_port | default(3030) }}"
chimerai_langfuse_network: "{{ chimerai_services.langfuse.network | default('chimerai-internal') }}"
chimerai_langfuse_app_dir: "{{ chimerai_deployment_root }}/langfuse"
chimerai_langfuse_state_dir: "{{ chimerai_state_root }}/langfuse"
chimerai_langfuse_postgres_dir: "{{ chimerai_langfuse_state_dir }}/postgres"
chimerai_langfuse_clickhouse_dir: "{{ chimerai_langfuse_state_dir }}/clickhouse"
chimerai_langfuse_minio_dir: "{{ chimerai_langfuse_state_dir }}/minio"
chimerai_langfuse_postgres_uid: "{{ chimerai_services.langfuse.postgres_uid | default('70') }}"
chimerai_langfuse_postgres_gid: "{{ chimerai_services.langfuse.postgres_gid | default('0') }}"
chimerai_langfuse_clickhouse_uid: "{{ chimerai_services.langfuse.clickhouse_uid | default('101') }}"
chimerai_langfuse_clickhouse_gid: "{{ chimerai_services.langfuse.clickhouse_gid | default('101') }}"
chimerai_langfuse_minio_uid: "{{ chimerai_services.langfuse.minio_uid | default('1000') }}"
chimerai_langfuse_minio_gid: "{{ chimerai_services.langfuse.minio_gid | default('1000') }}"
chimerai_langfuse_db_name: "{{ chimerai_services.langfuse.db_name | default('langfuse') }}"
chimerai_langfuse_db_user: "{{ chimerai_services.langfuse.db_user | default('langfuse') }}"
chimerai_langfuse_postgres_password: "{{ chimerai_services.langfuse.postgres_password | default('') }}"
chimerai_langfuse_clickhouse_db: "{{ chimerai_services.langfuse.clickhouse_db | default('langfuse') }}"
chimerai_langfuse_clickhouse_user: "{{ chimerai_services.langfuse.clickhouse_user | default('langfuse') }}"
chimerai_langfuse_clickhouse_password: "{{ chimerai_services.langfuse.clickhouse_password | default('') }}"
chimerai_langfuse_redis_password: "{{ chimerai_services.langfuse.redis_password | default('') }}"
chimerai_langfuse_minio_access_key: "{{ chimerai_services.langfuse.minio_access_key | default('langfuse') }}"
chimerai_langfuse_minio_secret_key: "{{ chimerai_services.langfuse.minio_secret_key | default('') }}"
chimerai_langfuse_nextauth_secret: "{{ chimerai_services.langfuse.nextauth_secret | default('') }}"
chimerai_langfuse_salt: "{{ chimerai_services.langfuse.salt | default('') }}"
chimerai_langfuse_encryption_key: "{{ chimerai_services.langfuse.encryption_key | default('') }}"
chimerai_langfuse_nextauth_url: "{{ chimerai_services.langfuse.nextauth_url | default('http://' ~ chimerai_langfuse_host ~ ':' ~ (chimerai_langfuse_host_port | string)) }}"
chimerai_langfuse_event_bucket: "{{ chimerai_services.langfuse.event_bucket | default('langfuse-events') }}"
chimerai_langfuse_media_bucket: "{{ chimerai_services.langfuse.media_bucket | default('langfuse-media') }}"
chimerai_langfuse_export_bucket: "{{ chimerai_services.langfuse.export_bucket | default('langfuse-exports') }}"
chimerai_langfuse_remove_state: "{{ chimerai_services.langfuse.remove_state | default(false) }}"
