---
- name: Validate ChimerAI action
  ansible.builtin.assert:
    that:
      - chimerai_action in ["validate", "apply", "remove", "backup", "restore"]
    fail_msg: "chimerai_action must be one of: validate, apply, remove, backup, restore"

- name: Validate required ChimerAI inventory values
  ansible.builtin.assert:
    that:
      - chimerai_host_name is defined
      - chimerai_timezone is defined
      - chimerai_deployment_root is defined
      - chimerai_state_root is defined
      - chimerai_enabled_roles is defined
      - chimerai_runtime is defined
      - chimerai_networks is defined
    fail_msg: "The inventory is missing required ChimerAI variables."

- name: Validate target OS family
  ansible.builtin.assert:
    that:
      - ansible_system == "Linux"
    fail_msg: "ChimerAI alpha deployment targets must report ansible_system=Linux."

- name: Report common configuration in validate mode
  ansible.builtin.debug:
    msg:
      - "host={{ chimerai_host_name }}"
      - "timezone={{ chimerai_timezone }}"
      - "deployment_root={{ chimerai_deployment_root }}"
      - "state_root={{ chimerai_state_root }}"
  when: chimerai_action == "validate"
  changed_when: false

- name: Create ChimerAI root directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ chimerai_deployment_root }}"
    - "{{ chimerai_state_root }}"
  when: chimerai_action == "apply"
