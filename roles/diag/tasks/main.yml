---
- name: Validate Docker runtime setting
  ansible.builtin.assert:
    that:
      - chimerai_runtime.engine == "docker"
      - chimerai_runtime.compose_command == "docker compose"
    fail_msg: "Milestone 1 expects Docker and Docker Compose v2."

- name: Check UFW status when available
  ansible.builtin.command: ufw status
  register: chimerai_diag_ufw_status
  check_mode: false
  changed_when: false
  failed_when: false
  when: chimerai_action == "validate"

- name: Report UFW status warning
  ansible.builtin.debug:
    msg: "UFW is not active or not installed. For public alpha deployments, expose only SSH plus Traefik ports 80 and 443."
  changed_when: false
  when:
    - chimerai_action == "validate"
    - >-
      (chimerai_diag_ufw_status.rc | default(1) != 0)
      or ('Status: active' not in (chimerai_diag_ufw_status.stdout | default('')))

- name: Inspect listening TCP ports
  ansible.builtin.command: ss -H -tln
  register: chimerai_diag_listening_tcp
  check_mode: false
  changed_when: false
  failed_when: false
  when: chimerai_action == "validate"

- name: Report public exposure warning
  ansible.builtin.debug:
    msg: "Review listening services. Public alpha hosts should route app traffic through Traefik on ports 80 and 443; app ports should bind to localhost or Docker-only networks."
  changed_when: false
  when:
    - chimerai_action == "validate"
    - chimerai_diag_listening_tcp.rc | default(1) == 0

- name: Inspect configured ChimerAI networks
  ansible.builtin.command: "docker network inspect {{ item.name }}"
  register: chimerai_network_inspect
  loop: "{{ chimerai_networks }}"
  check_mode: false
  changed_when: false
  failed_when:
    - chimerai_action == "apply"
    - not ansible_check_mode
    - chimerai_network_inspect.rc != 0

- name: Check Open WebUI HTTP endpoint after apply
  ansible.builtin.uri:
    url: "http://{{ chimerai_open_webui_host | default(chimerai_services.open_webui.host | default('127.0.0.1')) }}:{{ chimerai_open_webui_host_port | default(chimerai_services.open_webui.host_port | default(13080)) }}/"
    method: GET
    status_code:
      - 200
      - 302
      - 307
    timeout: 10
  register: chimerai_open_webui_http_check
  until: chimerai_open_webui_http_check is succeeded
  retries: 30
  delay: 5
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode
    - "'open_webui' in chimerai_enabled_roles"

- name: Check Todoist MCP health endpoint after apply
  ansible.builtin.uri:
    url: "http://{{ chimerai_services.mcp_todoist.host | default('127.0.0.1') }}:{{ chimerai_services.mcp_todoist.host_port | default(13002) }}/health"
    method: GET
    status_code: 200
    timeout: 10
  register: chimerai_diag_mcp_todoist_health
  until: chimerai_diag_mcp_todoist_health is succeeded
  retries: 30
  delay: 5
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode
    - "'mcp_todoist' in chimerai_enabled_roles"

- name: Check Todoist MCP streamable HTTP endpoint after apply
  ansible.builtin.uri:
    url: "http://{{ chimerai_services.mcp_todoist.host | default('127.0.0.1') }}:{{ chimerai_services.mcp_todoist.host_port | default(13002) }}/mcp"
    method: GET
    status_code: 405
    timeout: 10
  register: chimerai_diag_mcp_todoist_endpoint
  until: chimerai_diag_mcp_todoist_endpoint is succeeded
  retries: 30
  delay: 5
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode
    - "'mcp_todoist' in chimerai_enabled_roles"

- name: Check OpenClaw MCP registry entries after apply
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ chimerai_openclaw_project_name | default('chimerai-openclaw') }}-gateway"
      - node
      - dist/index.js
      - mcp
      - show
      - "{{ item.name }}"
      - --json
  loop: "{{ chimerai_mcp_servers | default([]) }}"
  register: chimerai_diag_openclaw_mcp_entries
  changed_when: false
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode
    - "'openclaw' in chimerai_enabled_roles"
    - chimerai_mcp_servers | default([]) | length > 0

- name: Report validation summary
  ansible.builtin.debug:
    msg: "ChimerAI diagnostics completed for action={{ chimerai_action }}"
  changed_when: false
