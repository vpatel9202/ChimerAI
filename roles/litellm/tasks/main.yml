---
- name: Validate LiteLLM configuration
  ansible.builtin.assert:
    that:
      - chimerai_litellm_image | length > 0
      - chimerai_litellm_postgres_image | length > 0
      - chimerai_litellm_host | length > 0
      - chimerai_litellm_host_port | int > 0
      - chimerai_litellm_container_port | int > 0
      - chimerai_litellm_network | length > 0
      - chimerai_litellm_models is sequence
    fail_msg: "LiteLLM configuration is incomplete."

- name: Validate LiteLLM secrets before apply
  ansible.builtin.assert:
    that:
      - chimerai_litellm_master_key | length > 0
      - chimerai_litellm_master_key is match('^sk-.+')
      - chimerai_litellm_master_key != 'replace-me'
      - chimerai_litellm_salt_key | length > 0
      - chimerai_litellm_salt_key != 'replace-me'
      - chimerai_litellm_postgres_password | length > 0
      - chimerai_litellm_postgres_password != 'replace-me'
    fail_msg: "LiteLLM apply requires master_key, salt_key, and postgres_password in the encrypted config. master_key must start with sk-."
  when: chimerai_action == "apply"
  no_log: true

- name: Create LiteLLM directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "0755"
  loop:
    - path: "{{ chimerai_litellm_app_dir }}"
    - path: "{{ chimerai_litellm_data_dir }}"
      owner: "70"
      group: "0"
  when: chimerai_action == "apply"

- name: Render LiteLLM env file
  ansible.builtin.template:
    src: litellm.env.j2
    dest: "{{ chimerai_litellm_app_dir }}/.env"
    mode: "0600"
  no_log: true
  when: chimerai_action == "apply"

- name: Render LiteLLM config file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ chimerai_litellm_app_dir }}/config.yaml"
    mode: "0600"
  no_log: true
  when: chimerai_action == "apply"

- name: Render LiteLLM Compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ chimerai_litellm_app_dir }}/compose.yml"
    mode: "0644"
  when: chimerai_action == "apply"

- name: Start LiteLLM
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_litellm_app_dir }}"
    project_name: "{{ chimerai_litellm_project_name }}"
    state: present
    remove_orphans: true
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Check LiteLLM readiness after apply
  ansible.builtin.uri:
    url: "http://{{ chimerai_litellm_host }}:{{ chimerai_litellm_host_port }}/health/readiness"
    method: GET
    status_code: 200
    return_content: true
  register: chimerai_litellm_readiness_check
  changed_when: false
  retries: 36
  delay: 5
  until: chimerai_litellm_readiness_check.status == 200
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Check whether LiteLLM Compose file exists
  ansible.builtin.stat:
    path: "{{ chimerai_litellm_app_dir }}/compose.yml"
  register: chimerai_litellm_compose_file
  when: chimerai_action == "remove"

- name: Stop and remove LiteLLM
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_litellm_app_dir }}"
    project_name: "{{ chimerai_litellm_project_name }}"
    state: absent
    remove_orphans: true
  when:
    - chimerai_action == "remove"
    - chimerai_litellm_compose_file.stat.exists

- name: Remove LiteLLM generated config
  ansible.builtin.file:
    path: "{{ chimerai_litellm_app_dir }}"
    state: absent
  when: chimerai_action == "remove"

- name: Remove LiteLLM state when explicitly allowed
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ chimerai_state_root }}:/chimerai-state"
      - alpine:3.20
      - sh
      - -c
      - rm -rf /chimerai-state/litellm
  when:
    - chimerai_action == "remove"
    - chimerai_litellm_remove_state | bool
  changed_when: true
