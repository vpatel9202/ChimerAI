---
- name: Validate Browser MCP configuration
  ansible.builtin.assert:
    that:
      - chimerai_mcp_browser_image | length > 0
      - chimerai_mcp_browser_host | length > 0
      - chimerai_mcp_browser_host_port | int > 0
      - chimerai_mcp_browser_container_port | int > 0
      - chimerai_mcp_browser_network | length > 0
      - chimerai_mcp_browser_browser in ['chromium', 'firefox', 'webkit']
    fail_msg: "Browser MCP configuration is incomplete."

- name: Create Browser MCP directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "0755"
  loop:
    - path: "{{ chimerai_mcp_browser_app_dir }}"
    - path: "{{ chimerai_mcp_browser_profile_dir }}"
      owner: "{{ chimerai_mcp_browser_uid }}"
      group: "{{ chimerai_mcp_browser_gid }}"
    - path: "{{ chimerai_mcp_browser_output_dir }}"
      owner: "{{ chimerai_mcp_browser_uid }}"
      group: "{{ chimerai_mcp_browser_gid }}"
  when: chimerai_action == "apply"

- name: Render Browser MCP Compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ chimerai_mcp_browser_app_dir }}/compose.yml"
    mode: "0644"
  when: chimerai_action == "apply"

- name: Start Browser MCP
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_mcp_browser_app_dir }}"
    project_name: "{{ chimerai_mcp_browser_project_name }}"
    state: present
    remove_orphans: true
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Register Browser MCP server
  ansible.builtin.set_fact:
    chimerai_mcp_servers: >-
      {{
        (chimerai_mcp_servers | default([])) + [
          {
            'name': 'browser',
            'url': 'http://' ~ chimerai_mcp_browser_project_name ~ ':' ~ (chimerai_mcp_browser_container_port | string) ~ '/mcp',
            'transport': 'streamable-http',
            'category': 'browser',
            'mutating': true
          }
        ]
      }}
  when: chimerai_action == "apply"

- name: Check Browser MCP endpoint after apply
  ansible.builtin.uri:
    url: "http://{{ chimerai_mcp_browser_host }}:{{ chimerai_mcp_browser_host_port }}/mcp"
    method: GET
    status_code:
      - 200
      - 400
      - 404
      - 405
      - 406
    timeout: 10
  register: chimerai_mcp_browser_endpoint
  until: chimerai_mcp_browser_endpoint is succeeded
  retries: 30
  delay: 5
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Check whether Browser MCP Compose file exists
  ansible.builtin.stat:
    path: "{{ chimerai_mcp_browser_app_dir }}/compose.yml"
  register: chimerai_mcp_browser_compose_file
  when: chimerai_action == "remove"

- name: Stop and remove Browser MCP
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_mcp_browser_app_dir }}"
    project_name: "{{ chimerai_mcp_browser_project_name }}"
    state: absent
    remove_orphans: true
  when:
    - chimerai_action == "remove"
    - chimerai_mcp_browser_compose_file.stat.exists

- name: Remove Browser MCP generated config
  ansible.builtin.file:
    path: "{{ chimerai_mcp_browser_app_dir }}"
    state: absent
  when: chimerai_action == "remove"

- name: Remove Browser MCP state when explicitly allowed
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ chimerai_state_root }}:/chimerai-state"
      - alpine:3.20
      - sh
      - -c
      - rm -rf /chimerai-state/mcp-browser
  when:
    - chimerai_action == "remove"
    - chimerai_mcp_browser_remove_state | bool
  changed_when: true
