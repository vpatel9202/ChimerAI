---
chimerai_n8n_name: n8n
chimerai_n8n_project_name: chimerai-n8n
chimerai_n8n_image: "{{ chimerai_services.n8n.image | default('n8nio/n8n:latest') }}"
chimerai_n8n_postgres_image: "{{ chimerai_services.n8n.postgres_image | default('postgres:16-alpine') }}"
chimerai_n8n_host: "{{ chimerai_services.n8n.host | default('127.0.0.1') }}"
chimerai_n8n_host_port: "{{ chimerai_services.n8n.host_port | default(15678) }}"
chimerai_n8n_container_port: "{{ chimerai_services.n8n.container_port | default(5678) }}"
chimerai_n8n_network: "{{ chimerai_services.n8n.network | default('chimerai-internal') }}"
chimerai_n8n_app_dir: "{{ chimerai_deployment_root }}/n8n"
chimerai_n8n_state_dir: "{{ chimerai_state_root }}/n8n"
chimerai_n8n_data_dir: "{{ chimerai_n8n_state_dir }}/data"
chimerai_n8n_postgres_dir: "{{ chimerai_n8n_state_dir }}/postgres"
chimerai_n8n_uid: "{{ chimerai_services.n8n.uid | default('1000') }}"
chimerai_n8n_gid: "{{ chimerai_services.n8n.gid | default('1000') }}"
chimerai_n8n_postgres_uid: "{{ chimerai_services.n8n.postgres_uid | default('70') }}"
chimerai_n8n_postgres_gid: "{{ chimerai_services.n8n.postgres_gid | default('0') }}"
chimerai_n8n_db_name: "{{ chimerai_services.n8n.db_name | default('n8n') }}"
chimerai_n8n_db_user: "{{ chimerai_services.n8n.db_user | default('n8n') }}"
chimerai_n8n_postgres_password: "{{ chimerai_services.n8n.postgres_password | default('') }}"
chimerai_n8n_encryption_key: "{{ chimerai_services.n8n.encryption_key | default('') }}"
chimerai_n8n_public_host: "{{ chimerai_services.n8n.public_host | default(chimerai_n8n_host) }}"
chimerai_n8n_protocol: "{{ chimerai_services.n8n.protocol | default('http') }}"
chimerai_n8n_webhook_url: "{{ chimerai_services.n8n.webhook_url | default('') }}"
chimerai_n8n_secure_cookie: "{{ chimerai_services.n8n.secure_cookie | default(false) }}"
chimerai_n8n_remove_state: "{{ chimerai_services.n8n.remove_state | default(false) }}"
