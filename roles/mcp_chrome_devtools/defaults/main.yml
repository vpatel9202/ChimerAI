---
chimerai_mcp_chrome_devtools_name: mcp-chrome-devtools
chimerai_mcp_chrome_devtools_project_name: chimerai-mcp-chrome-devtools
chimerai_mcp_chrome_devtools_image: "{{ chimerai_services.mcp_chrome_devtools.image | default('mcr.microsoft.com/playwright:v1.56.1-noble') }}"
chimerai_mcp_chrome_devtools_server_version: "{{ chimerai_services.mcp_chrome_devtools.server_version | default('0.2.7') }}"
chimerai_mcp_chrome_devtools_supergateway_version: "{{ chimerai_services.mcp_chrome_devtools.supergateway_version | default('3.4.3') }}"
chimerai_mcp_chrome_devtools_host: "{{ chimerai_services.mcp_chrome_devtools.host | default('127.0.0.1') }}"
chimerai_mcp_chrome_devtools_host_port: "{{ chimerai_services.mcp_chrome_devtools.host_port | default(13006) }}"
chimerai_mcp_chrome_devtools_container_port: "{{ chimerai_services.mcp_chrome_devtools.container_port | default(3000) }}"
chimerai_mcp_chrome_devtools_debug_port: "{{ chimerai_services.mcp_chrome_devtools.debug_port | default(9222) }}"
