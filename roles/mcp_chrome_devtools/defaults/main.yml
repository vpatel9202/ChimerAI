chimerai_mcp_chrome_devtools_headless: "{{ chimerai_services.mcp_chrome_devtools.headless | default(true) }}"
chimerai_mcp_chrome_devtools_isolated: "{{ chimerai_services.mcp_chrome_devtools.isolated | default(true) }}"
chimerai_mcp_chrome_devtools_remove_state: "{{ chimerai_services.mcp_chrome_devtools.remove_state | default(false) }}"
