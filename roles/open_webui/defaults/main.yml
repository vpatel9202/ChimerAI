---
chimerai_open_webui_name: open-webui
chimerai_open_webui_project_name: chimerai-open-webui
chimerai_open_webui_image: "{{ chimerai_services.open_webui.image | default('ghcr.io/open-webui/open-webui:main') }}"
chimerai_open_webui_host: "{{ chimerai_services.open_webui.host | default('127.0.0.1') }}"
chimerai_open_webui_host_port: "{{ chimerai_services.open_webui.host_port | default(13080) }}"
chimerai_open_webui_container_port: "{{ chimerai_services.open_webui.container_port | default(8080) }}"
chimerai_open_webui_auth_enabled: "{{ chimerai_services.open_webui.auth_enabled | default(true) }}"
chimerai_open_webui_network: "{{ chimerai_services.open_webui.network | default('chimerai-internal') }}"
chimerai_open_webui_app_dir: "{{ chimerai_deployment_root }}/open-webui"
chimerai_open_webui_data_dir: "{{ chimerai_state_root }}/open-webui/data"
chimerai_open_webui_secret_file: "{{ chimerai_open_webui_app_dir }}/.webui_secret_key"
chimerai_open_webui_remove_state: "{{ chimerai_services.open_webui.remove_state | default(false) }}"
