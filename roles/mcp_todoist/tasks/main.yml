---
- name: Validate Todoist MCP configuration
  ansible.builtin.assert:
    that:
      - chimerai_mcp_todoist_image | length > 0
      - chimerai_mcp_todoist_package_version | length > 0
      - chimerai_mcp_todoist_host | length > 0
      - chimerai_mcp_todoist_host_port | int > 0
      - chimerai_mcp_todoist_container_port | int > 0
      - chimerai_mcp_todoist_session_timeout_ms | int > 0
      - chimerai_mcp_todoist_network | length > 0
    fail_msg: "Todoist MCP configuration is incomplete."

- name: Validate Todoist MCP secrets before apply
  ansible.builtin.assert:
    that:
      - chimerai_mcp_todoist_api_key | length > 0
      - chimerai_mcp_todoist_api_key != 'replace-me'
    fail_msg: "Todoist MCP apply requires chimerai_services.mcp_todoist.todoist_api_key in the encrypted config."
  when: chimerai_action == "apply"
  no_log: true

- name: Create Todoist MCP directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "0755"
  loop:
    - path: "{{ chimerai_mcp_todoist_app_dir }}"
    - path: "{{ chimerai_mcp_todoist_npm_cache_dir }}"
      owner: "{{ chimerai_mcp_todoist_uid }}"
      group: "{{ chimerai_mcp_todoist_gid }}"
  when: chimerai_action == "apply"

- name: Render Todoist MCP env file
  ansible.builtin.template:
    src: mcp-todoist.env.j2
    dest: "{{ chimerai_mcp_todoist_app_dir }}/.env"
    mode: "0600"
  no_log: true
  when: chimerai_action == "apply"

- name: Render Todoist MCP Compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ chimerai_mcp_todoist_app_dir }}/compose.yml"
    mode: "0644"
  when: chimerai_action == "apply"

- name: Start Todoist MCP
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_mcp_todoist_app_dir }}"
    project_name: "{{ chimerai_mcp_todoist_project_name }}"
    state: present
    remove_orphans: true
  when:
    - chimerai_action == "apply"
    - not ansible_check_mode

- name: Check whether Todoist MCP Compose file exists
  ansible.builtin.stat:
    path: "{{ chimerai_mcp_todoist_app_dir }}/compose.yml"
  register: chimerai_mcp_todoist_compose_file
  when: chimerai_action == "remove"

- name: Stop and remove Todoist MCP
  community.docker.docker_compose_v2:
    project_src: "{{ chimerai_mcp_todoist_app_dir }}"
    project_name: "{{ chimerai_mcp_todoist_project_name }}"
    state: absent
    remove_orphans: true
  when:
    - chimerai_action == "remove"
    - chimerai_mcp_todoist_compose_file.stat.exists

- name: Remove Todoist MCP generated config
  ansible.builtin.file:
    path: "{{ chimerai_mcp_todoist_app_dir }}"
    state: absent
  when: chimerai_action == "remove"

- name: Remove Todoist MCP state when explicitly allowed
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ chimerai_state_root }}:/chimerai-state"
      - alpine:3.20
      - sh
      - -c
      - rm -rf /chimerai-state/mcp-todoist
  when:
    - chimerai_action == "remove"
    - chimerai_mcp_todoist_remove_state | bool
  changed_when: true
