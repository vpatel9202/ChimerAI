---
all:
  children:
    chimerai:
      hosts:
        localhost:
          ansible_connection: local

          chimerai_host_name: localhost
          chimerai_timezone: Etc/UTC
          chimerai_deployment_root: /opt/chimerai
          chimerai_state_root: /opt/chimerai/apps
          chimerai_action: validate
          chimerai_domain: example.com
          chimerai_acme_email: admin@example.com

          chimerai_ingress:
            enabled: true
            provider: traefik
            tls:
              enabled: true
              ca: letsencrypt
              resolver: letsencrypt
              challenge: http-01
              staging: true
            auth:
              provider: authentik
              protect_apps_by_default: true

          chimerai_enabled_roles:
            - common
            - docker
            - networks
            - traefik
            - authentik
            - backup
            - diag
            - open_webui
            - openclaw

          chimerai_runtime:
            engine: docker
            compose_command: docker compose

          chimerai_networks:
            - name: chimerai-public
              purpose: ingress
            - name: chimerai-internal
              purpose: private-service
            - name: chimerai-mcp
              purpose: mcp

          chimerai_services:
            traefik:
              enabled: true
              image: traefik:v3
              dashboard:
                enabled: false

            authentik:
              enabled: true
              image: ghcr.io/goauthentik/server:2025.10
              host: auth.example.com
              bootstrap_email: admin@example.com
              bootstrap_password: replace-me
              bootstrap_token: replace-me
              postgres_password: replace-me
              secret_key: replace-me
              automation_enabled: true

            open_webui:
              image: ghcr.io/open-webui/open-webui:main
              host: 127.0.0.1
              host_port: 13080
              container_port: 8080
              auth_enabled: true
              ingress:
                enabled: false
                host: webui.example.com
                auth_required: true

            openclaw:
              enabled: true
              image: ghcr.io/openclaw/openclaw:latest
              host: openclaw.example.com
              auth_required: true
              mcp_network: chimerai-mcp
              allow_unconfigured: true
              provider:
                anthropic_api_key: replace-me
                openai_api_key: replace-me

            mcp_todoist:
              enabled: false
              image: node:22-alpine
              package_version: "8.12.1"
              host: 127.0.0.1
              host_port: 13002
              container_port: 3000
              session_timeout_ms: 1800000
              todoist_api_key: replace-me

          chimerai_backup:
            enabled: false
            engine: restic
            repository: /opt/chimerai/backups/restic
            password: replace-me
            tags:
              - chimerai
