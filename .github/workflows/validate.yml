name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ansible-poc:
    name: Ansible POC validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Check shell script syntax
        run: |
          bash -n bin/chimerai
          bash -n install.sh
          bin/chimerai --help
          ln -s "$PWD/bin/chimerai" /tmp/chimerai
          /tmp/chimerai --help
          ./install.sh --help

      - name: Install Ansible collections
        run: uv run ansible-galaxy collection install -r requirements.yml

      - name: Validate role catalog
        run: uv run python scripts/validate_role_catalog.py

      - name: Check Ansible syntax
        run: uv run ansible-playbook chimerai.yml --syntax-check

      - name: Run safe Ansible dry run
        run: uv run ansible-playbook chimerai.yml --check
