name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ansible-poc:
    name: Ansible POC validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Check CLI wrapper syntax
        run: |
          bash -n bin/chimerai
          bin/chimerai --help

      - name: Install Ansible collections
        run: uv run ansible-galaxy collection install -r requirements.yml

      - name: Check Ansible syntax
        run: uv run ansible-playbook chimerai.yml --syntax-check

      - name: Run safe Ansible dry run
        run: uv run ansible-playbook chimerai.yml --check
